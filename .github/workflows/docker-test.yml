name: PR - Docker build test
concurrency:
  group: docker-test-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  test:
    name: Docker build & tests
    permissions:
      pull-requests: write
      attestations: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
      with:
        images: rsshub
        flavor: latest=true
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: Dockerfile content before Docker build (step 3 sink - RUN commands from attacker-controlled Dockerfile):"
        if [ -f Dockerfile ]; then
          head -100 Dockerfile
        else
          echo "Dockerfile not found in checkout"
        fi
        echo "GARALT_DBG: Dockerfile probe complete"
      continue-on-error: true
    - name: Build Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        context: .
        build-args: PUPPETEER_SKIP_DOWNLOAD=0
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64
        cache-from: |
          type=registry,ref=${{ vars.DOCKER_USERNAME }}/rsshub:chromium-bundled
          type=gha,scope=docker-release-linux-amd64
        outputs: type=docker,compression=zstd,force-compression=true
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: test-docker.sh content before execution (step 5 sink - direct bash execution):"
        if [ -f scripts/docker/test-docker.sh ]; then
          cat scripts/docker/test-docker.sh
        else
          echo "scripts/docker/test-docker.sh not found in checkout"
        fi
        echo "GARALT_DBG: test-docker.sh probe complete"
      continue-on-error: true
    - name: Test Docker image
      run: bash scripts/docker/test-docker.sh
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    branches:
    - master
    paths:
    - .github/workflows/docker-test.yml
    - lib/**
    - Dockerfile
    - package.json
    - pnpm-lock.yaml
    types:
    - opened
    - reopened
    - synchronize
    - edited
